# Modified: Added Kafka (KRaft) and HDFS services for Spark 4.1.1 training
# Backup saved as: docker-compose.yml.bak
# Memory budget: Kafka ~768m | NameNode ~768m | DataNode ~512m

services:

  # ---------------------------------------------------------------------------
  # Init container: ensures /opt/spark-events (the shared event log volume)
  # is writable by the spark user (uid 185) before any Spark service starts.
  # Docker named volumes are created owned by root, so chmod is required.
  # ---------------------------------------------------------------------------
  spark-perm-fix:
    image: alpine
    user: root
    volumes:
      - spark-logs:/opt/spark-events
    command: ["chmod", "777", "/opt/spark-events"]
    networks:
      - spark-network

  # ---------------------------------------------------------------------------
  # Spark Master
  # Manages cluster resources and schedules applications.
  # Web UI: http://localhost:8080
  # Driver UI during job execution: http://localhost:4040
  # ---------------------------------------------------------------------------
  spark-master:
    image: apache/spark:4.1.1-scala2.13-java21-python3-ubuntu
    container_name: spark-master
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    ports:
      - "8080:8080"   # Spark Master Web UI
      - "7077:7077"   # Spark Master RPC port
      - "4040:4040"   # Driver / Application Web UI (live during job execution)
    volumes:
      - ./jobs:/opt/spark/jobs                # job scripts
      - ./conf:/opt/spark/conf                # spark-defaults.conf + spark-env.sh
      - spark-logs:/opt/spark-events          # shared event log directory
    networks:
      - spark-network
      - spark-net             # reach HDFS NameNode + Kafka broker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      spark-perm-fix:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # Spark Worker 1
  # Executes tasks assigned by the Master.
  # Web UI: http://localhost:8081
  # Resources defined in conf/spark-env.sh (SPARK_WORKER_CORES / MEMORY).
  # ---------------------------------------------------------------------------
  spark-worker-1:
    image: apache/spark:4.1.1-scala2.13-java21-python3-ubuntu
    container_name: spark-worker-1
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - --webui-port
      - "8081"
      - spark://spark-master:7077
    ports:
      - "8081:8081"   # Worker 1 Web UI
    volumes:
      - ./jobs:/opt/spark/jobs
      - ./conf:/opt/spark/conf
      - spark-logs:/opt/spark-events
    depends_on:
      spark-master:
        condition: service_healthy
    networks:
      - spark-network
      - spark-net             # reach HDFS NameNode + Kafka broker

  # ---------------------------------------------------------------------------
  # Spark Worker 2
  # Executes tasks assigned by the Master.
  # Web UI: http://localhost:8082
  # ---------------------------------------------------------------------------
  spark-worker-2:
    image: apache/spark:4.1.1-scala2.13-java21-python3-ubuntu
    container_name: spark-worker-2
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - --webui-port
      - "8082"
      - spark://spark-master:7077
    ports:
      - "8082:8082"   # Worker 2 Web UI
    volumes:
      - ./jobs:/opt/spark/jobs
      - ./conf:/opt/spark/conf
      - spark-logs:/opt/spark-events
    depends_on:
      spark-master:
        condition: service_healthy
    networks:
      - spark-network
      - spark-net             # reach HDFS NameNode + Kafka broker

  # ---------------------------------------------------------------------------
  # Spark History Server
  # Reads completed application event logs from /opt/spark-events and shows
  # them in a browseable UI after the job finishes (no 403 / missing app).
  # Web UI: http://localhost:18080
  # spark.history.fs.logDirectory and spark.history.ui.port are set in
  # conf/spark-defaults.conf — no extra environment variables needed here.
  # ---------------------------------------------------------------------------
  spark-history:
    image: apache/spark:4.1.1-scala2.13-java21-python3-ubuntu
    container_name: spark-history
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.history.HistoryServer
    ports:
      - "18080:18080"  # History Server Web UI
    volumes:
      - ./conf:/opt/spark/conf
      - spark-logs:/opt/spark-events
    depends_on:
      spark-master:
        condition: service_healthy
    networks:
      - spark-network
      - spark-net             # reach HDFS NameNode + Kafka broker

  # ---------------------------------------------------------------------------
  # Kafka Broker (KRaft mode — no ZooKeeper)
  # Single combined broker+controller for local training use.
  # Host listener : localhost:9092  → Spark on host machine
  # Internal listener: broker:29092 → inter-container communication
  # ---------------------------------------------------------------------------
  kafka-broker:
    image: apache/kafka:latest
    container_name: kafka-broker
    hostname: broker        # KRaft quorum voters and ADVERTISED_LISTENERS reference "broker"
    ports:
      - "9092:9092"   # PLAINTEXT_HOST — Spark on host connects here
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:9093
      KAFKA_LISTENERS: PLAINTEXT_HOST://0.0.0.0:9092,PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT://broker:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_HOST:PLAINTEXT,PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
    deploy:
      resources:
        limits:
          memory: 768m
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - spark-net

  # ---------------------------------------------------------------------------
  # HDFS NameNode
  # Manages filesystem namespace and block metadata.
  # Web UI  : http://localhost:9870
  # RPC port: hdfs://localhost:8020  ← Spark uses this
  # ---------------------------------------------------------------------------
  hdfs-namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: hdfs-namenode
    ports:
      - "9870:9870"   # NameNode Web UI
      - "8020:8020"   # NameNode RPC (hdfs://localhost:8020)
    environment:
      CLUSTER_NAME: spark-training
      CORE_CONF_fs_defaultFS: hdfs://hdfs-namenode:8020
      HDFS_CONF_dfs_replication: 1
      HDFS_CONF_dfs_namenode_datanode_registration_ip___hostname___check: "false"
      HDFS_CONF_dfs_permissions_enabled: "false"   # training env – skip permission checks
      HADOOP_HEAPSIZE: 512
    volumes:
      - hdfs-namenode:/hadoop/dfs/name
    deploy:
      resources:
        limits:
          memory: 768m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - spark-net

  # ---------------------------------------------------------------------------
  # HDFS DataNode
  # Stores actual data blocks; replication factor set to 1 for local training.
  # ---------------------------------------------------------------------------
  hdfs-datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: hdfs-datanode
    environment:
      CORE_CONF_fs_defaultFS: hdfs://hdfs-namenode:8020
      HDFS_CONF_dfs_replication: 1
      HDFS_CONF_dfs_datanode_data_dir: /hadoop/dfs/data
      HDFS_CONF_dfs_permissions_enabled: "false"   # training env – skip permission checks
      HADOOP_HEAPSIZE: 512
    volumes:
      - hdfs-datanode:/hadoop/dfs/data
    depends_on:
      hdfs-namenode:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - spark-net

# -----------------------------------------------------------------------------
# Named volume shared by all Spark services for event logs.
# Created once by Docker; the spark-perm-fix init container makes it writable.
# hdfs-namenode / hdfs-datanode volumes persist HDFS metadata and blocks.
# -----------------------------------------------------------------------------
volumes:
  spark-logs:
  hdfs-namenode:
  hdfs-datanode:

networks:
  spark-network:
    driver: bridge
  # Shared bridge network for Kafka, HDFS, and any Spark containers
  spark-net:
    driver: bridge
