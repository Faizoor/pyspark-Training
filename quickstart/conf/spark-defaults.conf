# =============================================================================
# spark-defaults.conf  –  Cluster-wide default properties
# Mounted into every container at /opt/spark/conf/spark-defaults.conf
# =============================================================================

# -----------------------------------------------------------------------------
# Event logging
# Spark writes one JSON event log file per application to this directory.
# The directory must exist and be writable before any job is submitted.
# All containers share the same Docker named volume, so every service sees
# exactly the same files.
# -----------------------------------------------------------------------------
spark.eventLog.enabled          true
spark.eventLog.dir              file:///opt/spark-events

# -----------------------------------------------------------------------------
# History Server
# The History Server scans spark.history.fs.logDirectory for completed
# application logs and exposes them on port 18080.
# Point it at the same directory used for event logging above.
# -----------------------------------------------------------------------------
spark.history.fs.logDirectory   file:///opt/spark-events
spark.history.ui.port           18080

# -----------------------------------------------------------------------------
# Driver networking (Docker bridge)
# spark.driver.host        – hostname advertised to workers for RPC callbacks.
#                            Must be resolvable inside the Docker network.
# spark.driver.bindAddress – bind to all interfaces so the host can reach
#                            the driver UI via the published port mapping.
# -----------------------------------------------------------------------------
spark.driver.host               spark-master
spark.driver.bindAddress        0.0.0.0

# -----------------------------------------------------------------------------
# Reverse proxy (fixes browser links)
# Without this, the Master UI links to http://<container-id>:4040 which the
# browser cannot resolve.  With reverseProxy enabled, all application UI
# links become http://localhost:8080/proxy/<app-id>/ and are served by the
# Master's own Jetty, which IS accessible from the host.
# Per Spark docs this must be set on master, workers AND drivers — putting
# it here in spark-defaults.conf covers all of them automatically.
# -----------------------------------------------------------------------------
spark.ui.reverseProxy           true
spark.ui.reverseProxyUrl        http://localhost:8080
